<line x1="42" y1="710" x2="638" y2="710" stroke="#e0e0de" stroke-width="0.5"/>
<text class="ts" x="340" y="730" text-anchor="middle" fill="#999999">색상은 레이어 역할을 나타냅니다. 점선 테두리 = 클러스터 경계.</text>
