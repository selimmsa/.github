<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="820" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif; background: #ffffff;">
