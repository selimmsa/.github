<svg width="800" height="410" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* 모든 텍스트에 시스템 폰트 통합 적용 (따옴표 충돌 방지) */
      text { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
      }
      .th { font-weight: 700; font-size: 14px; fill: #1a1a1a; }
      .ts { font-weight: 400; font-size: 12px; fill: #555; }
      .repo { font-weight: 500; font-size: 11px; fill: #333; }
      .label-sm { font-weight: 400; font-size: 10px; fill: #999; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="m2,1l6,4l-6,4" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
  <g>
    <title>Layer 1</title>
    <rect x="32" y="9" width="360" height="204" rx="12" fill="#fcfcfc" stroke="#e0e0e0"/>
    <text class="th" x="46" y="30">LLMOps Platform</text>
    <text class="ts" x="180" y="30">고성능 RAG 및 에이전트 체계 구축</text>
    <rect x="53" y="40" width="140" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text class="th" x="123" y="63" text-anchor="middle">LLM Engine</text>
    <text class="repo" x="123" y="80" text-anchor="middle">vLLM / PyTorch</text>
    <rect x="213" y="40" width="160" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text class="th" x="293" y="63" text-anchor="middle">RAG Orchestrator</text>
    <text class="repo" x="293" y="80" text-anchor="middle">LangChain / Python</text>
    <line x1="193" y1="65" x2="213" y2="65" stroke="#888" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <rect x="53" y="110" width="320" height="90" rx="8" fill="#F1F1F1" stroke="#ccc" stroke-width="0.5"/>
    <text class="label-sm" x="63" y="125">Focus Areas</text>
    <text class="repo" x="73" y="145">• Main Control Tower</text>
    <text class="repo" x="73" y="165">• Service Layer / Data Indexing Pipeline</text>
    <text class="repo" x="73" y="185">• Model Management</text>

    <rect x="413" y="9" width="360" height="204" rx="12" fill="#fcfcfc" stroke="#e0e0e0"/>
    <text class="th" x="422" y="30">Cloud Native &amp; DevOps</text>
    <text class="ts" x="586" y="30">인프라 자동화 및 표준 아키텍처 수립</text>
    <rect x="433" y="40" width="160" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="th" x="513" y="63" text-anchor="middle">Infrastructure</text>
    <text class="repo" x="513" y="80" text-anchor="middle">Kubernetes / Containers</text>
    <rect x="613" y="40" width="140" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="th" x="683" y="63" text-anchor="middle">Automation</text>
    <text class="repo" x="683" y="80" text-anchor="middle">Helm / GitOps / Shell</text>
    <rect x="433" y="110" width="320" height="90" rx="8" fill="#F1F1F1" stroke="#ccc" stroke-width="0.5"/>
    <text class="label-sm" x="443" y="125">Focus Areas</text>
    <text class="repo" x="453" y="145">• Core Standard (Outer Architecture)</text>
    <text class="repo" x="453" y="165">• Validation Script</text>
    <text class="repo" x="453" y="185">• Standard CI/CD Pipeline</text>

    <rect x="33" y="235" width="740" height="163" rx="12" fill="#fcfcfc" stroke="#e0e0e0"/>
    <text class="th" x="47" y="256">Enterprise MSA Foundation</text>
    <text class="ts" x="235" y="256">안정적인 서비스 공통 기반 및 템플릿 제공</text>
    <rect x="53" y="270" width="220" height="50" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
    <text class="th" x="163" y="293" text-anchor="middle">Core Common</text>
    <text class="repo" x="163" y="310" text-anchor="middle">Java / Spring Boot / Config</text>
    <rect x="293" y="270" width="220" height="50" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
    <text class="th" x="403" y="293" text-anchor="middle">Backend Templates</text>
    <text class="repo" x="403" y="310" text-anchor="middle">Auth / BBS / File / Batch</text>
    <rect x="533" y="270" width="220" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text class="th" x="643" y="293" text-anchor="middle">Frontend &amp; Gateway</text>
    <text class="repo" x="643" y="310" text-anchor="middle">React / Spring Gateway</text>
    <rect x="53" y="340" width="700" height="46" rx="8" fill="#F1F1F1" stroke="#ccc" stroke-width="0.5"/>
    <text class="label-sm" x="63" y="355">Reference Assets</text>
    <text class="repo" x="73" y="375">Core: msa-cmmn, config-server | Backend: auth, bbs, file, batch | Frontend: API Gateway(SCG), Web UI(React)</text>

    <line x1="393" y1="100" x2="413" y2="100" stroke="#888" marker-end="url(#arrow)"/>
    <line x1="213" y1="214" x2="213" y2="234" stroke="#888" marker-end="url(#arrow)"/>
    <line x1="593" y1="214" x2="593" y2="234" stroke="#888" marker-end="url(#arrow)"/>
  </g>
</svg>
